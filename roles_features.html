<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matriz de Permissões - Dinâmica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        
        .header {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(59, 130, 246, 0.3);
        }
        
        .header h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header p {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }
        
        .controls {
            display: flex;
            gap: 16px;
            margin-top: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .control-group label {
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            font-weight: 500;
        }
        
        select, input[type="text"] {
            padding: 10px 14px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            font-size: 14px;
            background: rgba(255,255,255,0.1);
            color: white;
            min-width: 200px;
            transition: all 0.3s ease;
        }
        
        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: #60a5fa;
            background: rgba(255,255,255,0.15);
        }
        
        select option {
            background: #1e293b;
            color: white;
        }
        
        input[type="text"]::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .stats {
            display: flex;
            gap: 24px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px 24px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #60a5fa;
        }
        
        .stat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            margin-top: 4px;
        }
        
        .table-container {
            background: white;
            border-radius: 16px;
            height: 100vh;
            overflow: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        th {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white;
            padding: 16px 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 3px solid #3b82f6;
        }
        
        th:first-child {
            text-align: left;
            padding-left: 20px;
            min-width: 200px;
        }

        th:nth-child(2) {
            text-align: left;
            min-width: 110px;
        }

        th:not(:first-child):not(:nth-child(2)) {
            width: 72px;
            min-width: 72px;
            max-width: 72px;
            text-align: center;
            word-break: break-word;
            font-size: 10px;
            letter-spacing: 0;
        }
        
        td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
            font-size: 13px;
            transition: all 0.2s ease;
        }
        
        #tableBody > tr > td  {
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        td:first-child {
            text-align: left;
            padding-left: 16px;
        }

        .module-cell strong {
            font-size: 14px;
            font-weight: 700;
            color: #0f172a;
            display: block;
            margin-bottom: 2px;
        }

        .module-cell small {
            font-size: 10px;
            color: #94a3b8;
            letter-spacing: 0.2px;
        }
        
        td:nth-child(2) {
            text-align: center;
            color: #64748b;
            font-weight: 500;
        }
        
        tbody tr:hover td {
            background: #dbeafe !important;
        }

        /* Zebra de colunas (aplicado nas células de permissão) */
        .col-stripe-a { background: #f1f5f9; }
        .col-stripe-b { background: #ffffff; }
        
        /* Primeira linha de cada módulo */
        .module-first-row td {
            border-top: 3px solid #3b82f6;
        }
        
        .module-cell {
            position: relative;
        }
        
        .module-cell::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: #3b82f6;
        }
        
        .permission-dot {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            line-height: 1;
        }

        .permission-yes {
            color: #16a34a;
        }

        .permission-no {
            color: #fca5a5;
        }
        
        .action-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .action-get { background: #dbeafe; color: #1d4ed8; }
        .action-add { background: #dcfce7; color: #166534; }
        .action-edit { background: #fef3c7; color: #92400e; }
        .action-delete { background: #fee2e2; color: #991b1b; }
        .action-other { background: #e2e8f0; color: #475569; }
        
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }
        
        .no-results i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .json-info {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .json-info-icon {
            color: #22c55e;
            font-size: 18px;
        }
        
        .json-info-text {
            color: rgba(255,255,255,0.9);
            font-size: 13px;
        }
        
        .json-info-text strong {
            color: #22c55e;
        }

        /* Estilos para links de módulos */
        .module-link {
            color: #1e293b;
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .module-link:hover {
            color: #3b82f6;
            text-decoration: underline;
        }
        
        .module-link-icon {
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        
        .module-link:hover .module-link-icon {
            opacity: 1;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 20px;
            }
            
            .controls {
                flex-direction: column;
            }
            
            select, input[type="text"] {
                width: 100%;
            }
            
            .stats {
                justify-content: center;
            }
            
            th, td {
                padding: 8px 4px;
                font-size: 11px;
            }
            
            .permission-dot {
                width: 22px;
                height: 22px;
                font-size: 11px;
            }
        }
    </style>
</head>

        // FIM DO JSON - NÃO MODIFIQUE ABAIXO DESTA LINHA
        // ============================================================

        // Configuração de nomes amigáveis para módulos COM LINKS
        // Estrutura: { name: 'Nome do Módulo', link: 'URL do módulo' }
        // Se não quiser link, deixe link como null ou string vazia
        const moduleNames = {
            'clinic': { name: 'Clínica', link: '/clinics' },
            'user': { name: 'Usuário' },
            'unit': { name: 'Unidade', link: '/units' },
            'patient': { name: 'Paciente', link: '/patients' },
            'service_provider': { name: 'Prestador de Serviço', link: '/serviceprovider' },
            'service_provider_salary': { name: 'Salário do Prestador'},
            'dynamic_fields': { name: 'Campos Dinâmicos', link: '/dynamic-fields' },
            'responsible': { name: 'Responsável', link: '/responsibles' },
            'permissions': { name: 'Permissões' },
            'clinic_settings': { name: 'Config. da Clínica', link: '/clinic-settings' },
            'system_help': { name: 'Ajuda do Sistema', link: '/help' },
            'standard_criteria': { name: 'Critérios Padrão', link: '/standard-criteria' },
            'standard_schedules': { name: 'Agendamentos Padrão', link: '/standard-schedules' },
            'form': { name: 'Formulário', link: '/forms' },
            'patient_form': { name: 'Formulário do Paciente', link: '/response-form' },
            'form_answer': { name: 'Resposta de Formulário', link: '/form-answers' },
            'objectives': { name: 'Objetivos' },
            'appointment': { name: 'Agendamento', link: '/agenda' },
            'hours_control': { name: 'Controle de Horas', link: '/hours-control' },
            'timesheet': { name: 'Folha de Ponto' },
            'email_control': { name: 'Controle de Email'},
            'ia_control': { name: 'Controle de IA'},
            'ia': { name: 'IA' },
            'response_form': { name: 'Formulário de Resposta', link: '/response-form' },
            'attendance': { name: 'Atendimento', link: '/attendances' },
            'attendance_aba': { name: 'Atendimento ABA' },
            'evaluation': { name: 'Avaliação', link: '/evaluations' },
            'evolution': { name: 'Evolução' },
            'report': { name: 'Relatório' },
            'meeting_minutes': { name: 'Ata de Reunião', link: '/meeting-minutes' },
            'hash': { name: 'Hash' },
            'bug_suggestion': { name: 'Bug/Sugestão' },
            'supervision': { name: 'Supervisão', link: '/supervision' },
            'therapeutic_plan': { name: 'Plano Terapêutico', link: '/therapeutic-plan' },
            'config_session': { name: 'Config. de Sessão', link: '/config-session' },
            'response_evaluation': { name: 'Resposta de Avaliação', link: '/evaluations' },
            'patient_observation': { name: 'Observação do Paciente', link: '/patients' },
            'patient_team': { name: 'Equipe do Paciente', link: '/patients' },
            'absence': { name: 'Ausência', link: '/agenda' },
            'import': { name: 'Importação' },
            'user_self': { name: 'Auto-edição de Usuário' },
            'service_provider_self': { name: 'Auto-edição de Prestador' }
        };

        // Função auxiliar para obter o nome do módulo
        function getModuleName(key) {
            if (moduleNames[key]) {
                return typeof moduleNames[key] === 'object' ? moduleNames[key].name : moduleNames[key];
            }
            return formatModuleName(key);
        }

        // Função auxiliar para obter o link do módulo
        function getModuleLink(key) {
            if (moduleNames[key] && typeof moduleNames[key] === 'object') {
                return moduleNames[key].link || null;
            }
            return null;
        }

        // Nomes amigáveis para ações
        const actionNames = {
            'get': 'Visualizar',
            'add': 'Adicionar',
            'edit': 'Editar',
            'delete': 'Excluir',
            'cancel': 'Cancelar',
            'all': 'Todos',
            'list': 'Listar',
            'ia': 'IA',
            'documents': 'Documentos',
            'report': 'Relatório',
            'comment_add': 'Add Comentário',
            'like': 'Curtir',
            'execute': 'Executar',
            'finalize': 'Finalizar'
        };

        // Ordem preferencial dos módulos
        const moduleOrder = [
            'clinic', 'clinic_settings', 'user', 'user_self', 'unit', 'patient', 'patient_observation',
            'patient_team', 'service_provider', 'service_provider_salary', 'service_provider_self',
            'dynamic_fields', 'responsible', 'permissions', 'system_help',
            'standard_criteria', 'standard_schedules', 'form', 'patient_form', 'form_answer',
            'objectives', 'appointment', 'absence', 'hours_control', 'timesheet', 'email_control',
            'ia_control', 'ia', 'response_form', 'response_evaluation', 'attendance', 'attendance_aba',
            'evaluation', 'evolution', 'report', 'meeting_minutes', 'supervision',
            'therapeutic_plan', 'config_session', 'import', 'hash', 'bug_suggestion'
        ];

        // Variáveis globais
        let roles = [];
        let modules = {};
        let allPermissions = new Set();

        // Processar o JSON e extrair estrutura
        function processJsonData() {
            roles = rolesData.sys_role.filter(r => r.status === 'A');
            
            // Extrair todas as permissões únicas e organizar por módulo
            roles.forEach(role => {
                const authorities = role.authorities ? role.authorities.split(',') : [];
                authorities.forEach(auth => {
                    allPermissions.add(auth);
                    
                    // Extrair módulo e ação
                    const parts = auth.split('_');
                    let moduleName, action;
                    
                    // Lidar com módulos compostos (ex: service_provider_salary_get)
                    if (parts.length >= 3) {
                        // Tentar encontrar módulo composto
                        for (let i = parts.length - 1; i >= 1; i--) {
                            const possibleModule = parts.slice(0, i).join('_');
                            const possibleAction = parts.slice(i).join('_');
                            
                            if (actionNames[possibleAction] || ['get', 'add', 'edit', 'delete', 'cancel', 'all', 'list', 'report'].includes(possibleAction)) {
                                moduleName = possibleModule;
                                action = possibleAction;
                                break;
                            }
                        }
                        
                        if (!moduleName) {
                            moduleName = parts.slice(0, -1).join('_');
                            action = parts[parts.length - 1];
                        }
                    } else if (parts.length === 2) {
                        moduleName = parts[0];
                        action = parts[1];
                    } else {
                        moduleName = auth;
                        action = 'access';
                    }
                    
                    if (!modules[moduleName]) {
                        modules[moduleName] = {
                            name: getModuleName(moduleName),
                            link: getModuleLink(moduleName),
                            key: moduleName,
                            actions: new Set(),
                            permissions: {}
                        };
                        roles.forEach(r => {
                            modules[moduleName].permissions[r.name] = {};
                        });
                    }
                    
                    modules[moduleName].actions.add(action);
                });
            });
            
            // Preencher matriz de permissões
            roles.forEach(role => {
                const authorities = role.authorities ? role.authorities.split(',') : [];
                authorities.forEach(auth => {
                    const parts = auth.split('_');
                    let moduleName, action;
                    
                    if (parts.length >= 3) {
                        for (let i = parts.length - 1; i >= 1; i--) {
                            const possibleModule = parts.slice(0, i).join('_');
                            const possibleAction = parts.slice(i).join('_');
                            
                            if (actionNames[possibleAction] || ['get', 'add', 'edit', 'delete', 'cancel', 'all', 'list', 'report'].includes(possibleAction)) {
                                moduleName = possibleModule;
                                action = possibleAction;
                                break;
                            }
                        }
                        
                        if (!moduleName) {
                            moduleName = parts.slice(0, -1).join('_');
                            action = parts[parts.length - 1];
                        }
                    } else if (parts.length === 2) {
                        moduleName = parts[0];
                        action = parts[1];
                    } else {
                        moduleName = auth;
                        action = 'access';
                    }
                    
                    if (modules[moduleName] && modules[moduleName].permissions[role.name]) {
                        modules[moduleName].permissions[role.name][action] = true;
                    }
                });
            });
            
            // Converter Sets para Arrays e ordenar ações
            Object.keys(modules).forEach(key => {
                modules[key].actions = Array.from(modules[key].actions).sort((a, b) => {
                    const order = ['get', 'list', 'add', 'edit', 'delete', 'cancel', 'all'];
                    const aIdx = order.indexOf(a);
                    const bIdx = order.indexOf(b);
                    if (aIdx === -1 && bIdx === -1) return a.localeCompare(b);
                    if (aIdx === -1) return 1;
                    if (bIdx === -1) return -1;
                    return aIdx - bIdx;
                });
            });
        }

        // Formatar nome do módulo
        function formatModuleName(key) {
            return key.split('_').map(word => 
                word.charAt(0).toUpperCase() + word.slice(1)
            ).join(' ');
        }

        // Obter classe CSS para ação
        function getActionClass(action) {
            if (action === 'get' || action === 'list') return 'action-get';
            if (action === 'add') return 'action-add';
            if (action === 'edit') return 'action-edit';
            if (action === 'delete' || action === 'cancel') return 'action-delete';
            return 'action-other';
        }

        // Abreviar nome da role para caber no header
        function abbreviateRoleName(name) {
            const abbreviations = {
                'Terapeuta ABA': 'Ter. ABA',
                'Terapeuta Ocupacional': 'Ter. Ocup.',
                'Fonoaudiólogo': 'Fono',
                'Neuropsicólogo': 'Neuro',
                'Psicopedagogo': 'Psicoped.',
                'Musicoterapeuta': 'Music.',
                'Nutricionista': 'Nutri.',
                'Administrativo': 'Admin.',
                'Coordenador': 'Coord.',
                'Supervisor': 'Superv.',
                'Responsável': 'Resp.'
            };
            return abbreviations[name] || name;
        }

        // Renderizar tabela
        function renderTable(moduleFilter = 'all', roleFilter = 'all', searchTerm = '') {
            const header = document.getElementById('tableHeader');
            const body = document.getElementById('tableBody');
            
            // Filtrar roles
            let filteredRoles = roles;
            if (roleFilter !== 'all') {
                filteredRoles = roles.filter(r => r.name === roleFilter);
            }
            
            // Renderizar header
            header.innerHTML = '<th>Módulo</th><th>Ação</th>' +
                filteredRoles.map(role => `<th title="${role.name}">${abbreviateRoleName(role.name)}</th>`).join('');
            
            // Ordenar módulos
            const sortedModules = Object.keys(modules).sort((a, b) => {
                const aIdx = moduleOrder.indexOf(a);
                const bIdx = moduleOrder.indexOf(b);
                if (aIdx === -1 && bIdx === -1) return a.localeCompare(b);
                if (aIdx === -1) return 1;
                if (bIdx === -1) return -1;
                return aIdx - bIdx;
            });
            
            // Filtrar módulos
            let filteredModules = sortedModules;
            if (moduleFilter !== 'all') {
                filteredModules = sortedModules.filter(m => m === moduleFilter);
            }
            
            // Filtrar por busca
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filteredModules = filteredModules.filter(moduleKey => {
                    const module = modules[moduleKey];
                    return moduleKey.toLowerCase().includes(term) ||
                           module.name.toLowerCase().includes(term) ||
                           module.actions.some(a => a.toLowerCase().includes(term));
                });
            }
            
            // Renderizar body
            body.innerHTML = '';
            let moduleIndex = 0;
            let totalAssignments = 0;
            
            filteredModules.forEach(moduleKey => {
                const module = modules[moduleKey];
                module.actions.forEach((action, actionIdx) => {
                    const row = document.createElement('tr');
                    
                    if (actionIdx === 0) {
                        row.classList.add('module-first-row');
                    }
                    
                    // Célula do módulo (apenas na primeira linha)
                    if (actionIdx === 0) {
                        const moduleCell = document.createElement('td');
                        moduleCell.rowSpan = module.actions.length;
                        moduleCell.className = 'module-cell';
                        
                        // Verificar se tem link
                        if (module.link) {
                            moduleCell.innerHTML = `
                                <a href="https://app.nonprod.elo-clinic.com${module.link}" class="module-link" target="_blank" title="Abrir ${module.name}">
                                    <strong>${module.name}</strong>
                                    <span class="module-link-icon">🔗</span>
                                </a>
                                <br><small style="color:#64748b">${moduleKey}</small>
                            `;
                        } else {
                            moduleCell.innerHTML = `<strong>${module.name}</strong><br><small style="color:#64748b">${moduleKey}</small>`;
                        }
                        
                        row.appendChild(moduleCell);
                    }
                    
                    // Célula da ação
                    const actionCell = document.createElement('td');
                    const actionLabel = actionNames[action] || action;
                    actionCell.innerHTML = `<span class="action-badge ${getActionClass(action)}">${actionLabel}</span>`;
                    row.appendChild(actionCell);
                    
                    // Células de permissões
                    filteredRoles.forEach((role, roleIdx) => {
                        const permCell = document.createElement('td');
                        permCell.classList.add(roleIdx % 2 === 0 ? 'col-stripe-a' : 'col-stripe-b');
                        const hasPermission = module.permissions[role.name] && module.permissions[role.name][action];

                        if (hasPermission) totalAssignments++;

                        permCell.innerHTML = `<span class="permission-dot ${hasPermission ? 'permission-yes' : 'permission-no'}"
                            title="${role.name}: ${hasPermission ? 'Sim' : 'Não'}">
                            ${hasPermission ? '✓' : '✗'}
                        </span>`;
                        row.appendChild(permCell);
                    });
                    
                    body.appendChild(row);
                });
                
                moduleIndex++;
            });
            
            // Atualizar estatísticas
            document.getElementById('totalAssignments').textContent = totalAssignments;
            
            // Mostrar mensagem se não houver resultados
            if (filteredModules.length === 0) {
                body.innerHTML = `
                    <tr>
                        <td colspan="${filteredRoles.length + 2}" class="no-results">
                            <div>🔍</div>
                            <p>Nenhum resultado encontrado</p>
                        </td>
                    </tr>
                `;
            }
        }

        // Inicializar filtros
        function initFilters() {
            const moduleSelect = document.getElementById('moduleFilter');
            const roleSelect = document.getElementById('roleFilter');
            const searchInput = document.getElementById('searchInput');
            
            // Popular filtro de módulos
            const sortedModules = Object.keys(modules).sort((a, b) => {
                const aIdx = moduleOrder.indexOf(a);
                const bIdx = moduleOrder.indexOf(b);
                if (aIdx === -1 && bIdx === -1) return a.localeCompare(b);
                if (aIdx === -1) return 1;
                if (bIdx === -1) return -1;
                return aIdx - bIdx;
            });
            
            sortedModules.forEach(key => {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = modules[key].name;
                moduleSelect.appendChild(option);
            });
            
            // Popular filtro de roles
            roles.forEach(role => {
                const option = document.createElement('option');
                option.value = role.name;
                option.textContent = role.name;
                roleSelect.appendChild(option);
            });
            
            // Event listeners
            moduleSelect.addEventListener('change', () => {
                renderTable(moduleSelect.value, roleSelect.value, searchInput.value);
            });
            
            roleSelect.addEventListener('change', () => {
                renderTable(moduleSelect.value, roleSelect.value, searchInput.value);
            });
            
            searchInput.addEventListener('input', () => {
                renderTable(moduleSelect.value, roleSelect.value, searchInput.value);
            });
        }

        // Atualizar estatísticas
        function updateStats() {
            document.getElementById('totalRoles').textContent = roles.length;
            document.getElementById('totalModules').textContent = Object.keys(modules).length;
            document.getElementById('totalPermissions').textContent = allPermissions.size;
        }

        // Inicialização
        function init() {
            processJsonData();
            updateStats();
            initFilters();
            renderTable();
        }

        // Executar quando o DOM estiver pronto
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
